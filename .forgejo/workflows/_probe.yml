name: probe
on:
  push:
    branches: [chore/forgejo-ci-port]
    paths: ['.forgejo/workflows/_probe.yml']
jobs:
  native:
    name: probe-native-runner
    runs-on: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: inventory + composer install (capture to diag.log)
        run: |
          set +e
          {
            echo "===== NATIVE docker runner tool inventory ====="
            for t in php composer node git bash; do printf '%s: ' "$t"; command -v "$t" >/dev/null 2>&1 && { command -v "$t"; "$t" --version 2>&1 | head -1; } || echo MISSING; done
            echo
            echo "===== composer install (native) ====="
            composer install --prefer-dist --no-interaction --ignore-platform-reqs 2>&1
            echo "COMPOSER_EXIT=$?"
          } > diag.log 2>&1
      - name: publish diag.log to ci-diag branch
        run: |
          git config user.email ci@webgrip.dev
          git config user.name webgrip-ci
          git checkout -B ci-diag
          git add -f diag.log
          git -c commit.gpgsign=false commit -m "probe: native runner diag output [skip ci]" || true
          git push -f origin ci-diag
