name: '[Workflow] On Documentation Change'

# Forgejo mirror of .github/workflows/on_docs_change.yml. The update_techdocs reusable requires the
# CI bot's FORGEJO_TOKEN (it pushes the built site to the pages branch — replaces GITHUB_TOKEN).

on:
  push:
    branches:
      - 'main'
    paths:
      - 'docs/techdocs/**'
      - '.forgejo/workflows/on_docs_change.yml'
  workflow_dispatch:
    inputs:
      source-dir:
        type: string
        description: 'The directory containing the techdocs files'
        required: false
        default: 'docs/techdocs'

jobs:
  update-techdocs:
    name: 'Update TechDocs'
    uses: webgrip/workflows/.forgejo/workflows/update_techdocs.yml@main
    with:
      source-dir: ${{ github.event.inputs.source-dir || 'docs/techdocs' }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.WEBGRIP_CI_TOKEN }}

