name: diag
on:
  push:
jobs:
  a-checkout-in-container:
    runs-on: docker
    container:
      image: composer:2.8.5
    steps:
      - uses: actions/checkout@v4
      - run: echo "A-ok checkout-in-container"; ls -la
  b-cache:
    runs-on: docker
    container:
      image: composer:2.8.5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor
          key: "diag-${{ hashFiles('**/composer.lock') }}"
      - run: echo "B-ok cache"
  c-composer-install:
    runs-on: docker
    container:
      image: composer:2.8.5
    steps:
      - uses: actions/checkout@v4
      - run: composer install --prefer-dist --no-interaction --ignore-platform-reqs && echo "C-ok install"
  d-no-container:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - run: echo "D-ok no-container (native docker runner)"
